<!DOCTYPE html>
<html lang="en">
<!-- Template: https://github.com/luost26/academic-homepage -->
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{{ page.title }} - {{ site.data.profile.navbar_name }}</title>

    <!-- Favicon -->
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css" integrity="sha512-P5MgMn1jBN01asBgU0z60Qk4QxiXo86+wlFahKrsQf37c9cro517WzVSPPV1tDKzhku2iJ2FVgL67wG03SGnNA==" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.1/css/academicons.min.css" integrity="sha512-b1ASx0WHgVFL5ZQhTgiPWX+68KjS38Jk87jg7pe+qC7q9YkEtFq0z7xCglv7qGIs/68d3mAp+StfC8WKC5SSAg==" crossorigin="anonymous" />
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lato-font/3.0.0/css/lato-font.min.css"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Raleway:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/global.css' | relative_url }}">
</head>
<body class="bg-light" {{ page.body_attr }}>
    {% include navbar.html %}
    <div class="container">
        {{content}}
    </div>
    {% include footer.html %}

    <!-- Export Citation modal -->
    <div class="modal fade" id="exportCitationModal" tabindex="-1" role="dialog" aria-labelledby="exportCitationModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered export-citation-modal-dialog" role="document">
            <div class="modal-content export-citation-modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exportCitationModalTitle">Export Citation</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body export-citation-modal-body">
                    <ul class="nav nav-tabs mb-2" role="tablist" id="exportCitationTabList">
                        <li class="nav-item" id="exportCitationBibtexTabLi">
                            <a class="nav-link" id="bibtex-tab" data-toggle="tab" href="#exportCitationBibtexPane" role="tab" aria-controls="exportCitationBibtexPane">BibTeX</a>
                        </li>
                        <li class="nav-item" id="exportCitationRisTabLi">
                            <a class="nav-link" id="ris-tab" data-toggle="tab" href="#exportCitationRisPane" role="tab" aria-controls="exportCitationRisPane">RIS</a>
                        </li>
                    </ul>
                    <div class="tab-content export-citation-tab-content">
                        <div class="tab-pane fade" id="exportCitationBibtexPane" role="tabpanel" aria-labelledby="bibtex-tab">
                            <pre id="exportCitationModalContent" class="export-citation-pre bg-light border rounded p-3 small mb-3"></pre>
                            <div class="text-right">
                                <button type="button" class="btn btn-sm export-citation-copy-btn" data-export-citation-target="exportCitationModalContent" title="Copy to clipboard"><i class="fas fa-copy"></i> Copy</button>
                            </div>
                        </div>
                        <div class="tab-pane fade" id="exportCitationRisPane" role="tabpanel" aria-labelledby="ris-tab">
                            <pre id="exportCitationModalRisContent" class="export-citation-pre bg-light border rounded p-3 small mb-3"></pre>
                            <div class="text-right">
                                <button type="button" class="btn btn-sm export-citation-copy-btn" data-export-citation-target="exportCitationModalRisContent" title="Copy to clipboard"><i class="fas fa-copy"></i> Copy</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery.lazy/1.7.9/jquery.lazy.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/js/bootstrap.min.js" integrity="sha512-XKa9Hemdy1Ui3KSGgJdgMyYlUg1gM+QhL6cnlyTe2qzMCYm4nAZ1PsVerQzTTXzonUR+dmswHqgJPuwCq1MaAg==" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/github-buttons/2.14.2/buttons.min.js" integrity="sha512-OYwZx04hKFeFNYrWxIyo3atgGpb+cxU0ENWBZs72X7T9U+NoHPM1ftUn/Mfw7dRDXrqWA6M1wBg6z6fGE32aeA==" crossorigin="anonymous"></script>
    <script src="{{ '/assets/js/common.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/bubble_visual_hash.js' | relative_url }}"></script>
</body>
</html>
